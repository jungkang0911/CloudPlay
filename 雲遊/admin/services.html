<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服務卡管理 — 雲遊後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="_admin.js"></script>
</head>
<body>
<main class="admin-main">
  <h1 class="page-title">服務卡管理</h1>
  <div class="toolbar">
    <button class="btn-primary toolbar-right" onclick="openPanel()">＋ 新增服務卡</button>
  </div>
  <table class="adm-table">
    <thead><tr><th style="width:32px;"></th><th>Tag</th><th>標題</th><th>描述</th><th></th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</main>

<div id="panel-overlay" class="panel-overlay" style="display:none;" onclick="closePanel(event)">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-title">
      <span id="panel-heading">新增服務卡</span>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tag</label>
        <input id="f-tag" class="adm-input" placeholder="e.g. Visa">
      </div>
      <div class="form-group">
        <label class="form-label">排序</label>
        <input id="f-sort" class="adm-input" type="number" value="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">標題 *</label>
      <input id="f-title" class="adm-input">
    </div>
    <div class="form-group">
      <label class="form-label">描述</label>
      <textarea id="f-desc" class="adm-textarea"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">背景圖片 URL</label>
      <input id="f-bg" class="adm-input">
      <div id="f-bg-preview" style="margin-top:8px;"></div>
    </div>
    <div class="form-group">
      <label class="form-label">連結 URL</label>
      <input id="f-link" class="adm-input">
    </div>
    <div class="panel-actions">
      <button class="btn-danger" id="btn-delete" onclick="doDelete()" style="margin-right:auto;display:none;">刪除</button>
      <button class="btn-ghost" onclick="closePanel()">取消</button>
      <button class="btn-primary" onclick="doSave()">儲存</button>
    </div>
  </div>
</div>

<script>
let rows = [], editId = null;

(async () => {
  const session = await requireAuth(); if (!session) return;
  injectSidebar(session); await load();
})();

async function load() {
  const { data } = await sb.from('services').select('*').order('sort_order');
  rows = data || []; render();
}

function render() {
  const tbody = document.getElementById('tbody'); tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.dataset.id = r.id;
    tr.innerHTML = `<td><span class="drag-handle">⠿</span></td><td><span class="badge badge-muted">${r.tag||'—'}</span></td><td style="font-weight:500;">${r.title}</td><td style="color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.description||'—'}</td><td><button class="btn-ghost" style="padding:4px 12px;font-size:12px;" onclick="openPanel(${r.id})">編輯</button></td>`;
    tbody.appendChild(tr);
  });
  makeSortable(tbody, 'services', 'id');
}

function openPanel(id) {
  editId = id||null; const r = id ? rows.find(x=>x.id===id) : null;
  document.getElementById('panel-heading').textContent = r ? '編輯服務卡' : '新增服務卡';
  document.getElementById('f-tag').value   = r?.tag   || '';
  document.getElementById('f-title').value = r?.title || '';
  document.getElementById('f-desc').value  = r?.description || '';
  document.getElementById('f-bg').value    = r?.bg_img || '';
  document.getElementById('f-link').value  = r?.link  || '';
  document.getElementById('f-sort').value  = r?.sort_order ?? 0;
  document.getElementById('btn-delete').style.display = r ? 'inline-block' : 'none';
  preview(r?.bg_img||'');
  document.getElementById('panel-overlay').style.display = 'flex';
}

function closePanel(e) { if(e&&e.target!==document.getElementById('panel-overlay'))return; document.getElementById('panel-overlay').style.display='none'; }
document.getElementById('f-bg').addEventListener('input', e => preview(e.target.value));
function preview(url) { const el=document.getElementById('f-bg-preview'); el.innerHTML=url?`<img src="${url}" style="max-width:100%;max-height:100px;border-radius:4px;border:1px solid var(--border);" onerror="this.style.display='none'">`:''; }

async function doSave() {
  const title = document.getElementById('f-title').value.trim(); if(!title){toast('標題為必填','error');return;}
  const payload = { tag:document.getElementById('f-tag').value.trim()||null, title, description:document.getElementById('f-desc').value.trim()||null, bg_img:document.getElementById('f-bg').value.trim()||null, link:document.getElementById('f-link').value.trim()||null, sort_order:parseInt(document.getElementById('f-sort').value)||0 };
  const {error} = editId ? await sb.from('services').update(payload).eq('id',editId) : await sb.from('services').insert(payload);
  if(error){toast('儲存失敗：'+error.message,'error');return;} toast('已儲存'); document.getElementById('panel-overlay').style.display='none'; await load();
}

async function doDelete() {
  if(!confirm2('確定刪除？'))return;
  const{error}=await sb.from('services').delete().eq('id',editId);
  if(error){toast('刪除失敗','error');return;} toast('已刪除'); document.getElementById('panel-overlay').style.display='none'; await load();
}
</script>
</body>
</html>
