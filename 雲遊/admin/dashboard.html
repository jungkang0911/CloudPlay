<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>總覽 — 雲遊後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="_admin.js"></script>
</head>
<body>
<main class="admin-main">
  <h1 class="page-title">總覽</h1>
  <div id="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:36px;"></div>
  <div style="color:var(--muted);font-size:13px;margin-bottom:32px;">快速入口：從左側側欄選擇要管理的項目。</div>

  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:24px 28px;">
    <h2 style="font-size:14px;font-weight:500;margin-bottom:8px;">匯出翻譯檔</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;">將所有 DB 文字內容匯出為 <code style="background:var(--bg3);padding:2px 6px;border-radius:3px;font-size:11px;">tc.json</code>，貼到 Google Translate 翻譯後存為對應語言的 JSON，放進 <code style="background:var(--bg3);padding:2px 6px;border-radius:3px;font-size:11px;">js/translations/</code> 資料夾。</p>
    <button class="btn-primary" onclick="exportTranslations()">匯出 tc.json</button>
    <span id="export-status" style="margin-left:12px;font-size:12px;color:var(--muted);"></span>
  </div>
</main>

<script>
const TABLES = [
  { key: 'countries',     label: '國家',    href: 'countries.html',  icon: '🌏' },
  { key: 'cities',        label: '城市',    href: 'cities.html',     icon: '🏙️' },
  { key: 'categories',    label: '分類',    href: 'categories.html', icon: '📂' },
  { key: 'vendors',       label: '商家',    href: 'categories.html', icon: '🏪' },
  { key: 'services',      label: '服務卡',  href: 'services.html',   icon: '🛎️' },
  { key: 'faqs',          label: '常見問題', href: 'faqs.html',      icon: '❓' },
  { key: 'steps',         label: '出行步驟', href: 'steps.html',     icon: '👣' },
  { key: 'currencies',    label: '匯率',    href: 'currencies.html', icon: '💱' },
  { key: 'marquee_items', label: '跑馬燈',  href: 'marquee.html',   icon: '📢' },
];

(async () => {
  const session = await requireAuth();
  if (!session) return;
  injectSidebar(session);

  const grid = document.getElementById('stats-grid');

  async function exportTranslations() {
    const status = document.getElementById('export-status');
    status.textContent = '查詢中…';
    const [cats, svcs, steps, faqs, marquee] = await Promise.all([
      sb.from('categories').select('id,name').order('sort_order'),
      sb.from('services').select('id,title,description').order('sort_order'),
      sb.from('steps').select('id,label,sub').order('sort_order'),
      sb.from('faqs').select('id,question,answer').order('sort_order'),
      sb.from('marquee_items').select('id,text').order('sort_order'),
    ]);
    const out = {
      categories: Object.fromEntries((cats.data||[]).map(r => [r.id, { name: r.name }])),
      services:   Object.fromEntries((svcs.data||[]).map(r => [r.id, { title: r.title, description: r.description }])),
      steps:      Object.fromEntries((steps.data||[]).map(r => [r.id, { label: r.label, sub: r.sub }])),
      faqs:       Object.fromEntries((faqs.data||[]).map(r => [r.id, { question: r.question, answer: r.answer }])),
      marquee:    Object.fromEntries((marquee.data||[]).map(r => [r.id, { text: r.text }])),
    };
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tc.json';
    a.click();
    status.textContent = '✓ 已下載';
    setTimeout(() => status.textContent = '', 3000);
  }

  await Promise.all(TABLES.map(async t => {
    const { count } = await sb.from(t.key).select('*', { count: 'exact', head: true });
    const card = document.createElement('a');
    card.href = t.href;
    card.style.cssText = 'background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;text-decoration:none;transition:border-color 0.15s;display:block;';
    card.onmouseover = () => card.style.borderColor = 'var(--gold)';
    card.onmouseout  = () => card.style.borderColor = 'var(--border)';
    card.innerHTML = `
      <div style="font-size:22px;margin-bottom:10px;">${t.icon}</div>
      <div style="font-size:28px;font-weight:300;color:var(--gold);margin-bottom:4px;">${count ?? '—'}</div>
      <div style="font-size:12px;color:var(--muted);">${t.label}</div>`;
    grid.appendChild(card);
  }));
})();
</script>
</body>
</html>
