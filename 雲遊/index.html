<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雲遊國際 · 一站式觀光</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+TC:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --gold: #c8a96e;
    --gold-light: #e2c98a;
    --gold-dim: #a08040;
    --black: #0a0906;
    --black2: #13110d;
    --black3: #1c1914;
    --black4: #252219;
    --white: #f5f0e8;
    --white2: #ede5d5;
    --text-muted: #9a9080;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-sans: 'Noto Sans TC', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-sans);
    font-weight: 300;
    overflow-x: hidden;
  }
  body.lang-vi { font-family: 'Be Vietnam Pro', sans-serif; }
  body.lang-ja { font-family: 'Noto Sans JP', sans-serif; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--black2); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  /* ── Marquee ── */
  .marquee-bar {
    background: var(--black);
    border-bottom: 1px solid rgba(200,169,110,0.2);
    overflow: hidden;
    height: 32px;
    display: flex;
    align-items: center;
  }
  .marquee-track {
    display: flex;
    animation: marquee 38s linear infinite;
    white-space: nowrap;
  }
  .marquee-item {
    padding: 0 48px;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── Navbar: 漢堡+城市左, Logo中央, 搜尋右 ── */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,9,6,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(200,169,110,0.15);
    height: 72px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
  }
  .nav-left { display: flex; align-items: center; gap: 14px; }
  .nav-right { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }

  /* 漢堡按鈕 */
  .hamburger {
    background: none;
    border: 1px solid rgba(200,169,110,0.25);
    cursor: pointer;
    width: 38px;
    height: 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: border-color 0.2s, background 0.2s;
  }
  .hamburger:hover { border-color: var(--gold); background: rgba(200,169,110,0.05); }
  .hamburger span {
    display: block;
    width: 18px;
    height: 1.5px;
    background: var(--gold);
    transition: all 0.3s;
  }

  /* 城市下拉觸發 */
  .city-trigger {
    background: none;
    border: 1px solid rgba(200,169,110,0.25);
    color: var(--white);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.06em;
    padding: 8px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    min-width: 120px;
    justify-content: space-between;
  }
  .city-trigger:hover { border-color: var(--gold); background: rgba(200,169,110,0.04); }
  .city-trigger-flag { font-size: 14px; }
  .city-trigger-arrow {
    font-size: 8px;
    color: var(--gold);
    opacity: 0.7;
    transition: transform 0.2s;
  }
  .city-trigger.open .city-trigger-arrow { transform: rotate(180deg); }

  /* 城市下拉內容 */
  .city-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--black2);
    border: 1px solid rgba(200,169,110,0.25);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    z-index: 200;
    min-width: 240px;
    padding: 4px 0 8px;
    animation: dropIn 0.2s ease;
  }
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .city-menu-country {
    padding: 12px 18px 6px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    border-top: 1px solid rgba(200,169,110,0.08);
  }
  .city-menu-country:first-child { border-top: none; }
  .city-menu-item {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 10px 18px;
    background: none;
    border: none;
    color: var(--white2);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .city-menu-item:hover { background: rgba(200,169,110,0.07); color: var(--gold); }
  .city-menu-item.active { background: rgba(200,169,110,0.1); color: var(--gold); }
  .city-menu-item.active::after {
    content: '✓';
    margin-left: auto;
    font-size: 12px;
  }

  /* Logo 置中 */
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    text-decoration: none;
  }
  .nav-logo-img { height: 38px; width: auto; display: block; }
  .nav-logo-text {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.18em;
    white-space: nowrap;
  }

  /* 搜尋圖示按鈕 */
  .icon-btn {
    width: 38px;
    height: 38px;
    border: 1px solid rgba(200,169,110,0.25);
    background: none;
    color: var(--gold);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:hover { border-color: var(--gold); background: rgba(200,169,110,0.05); }
  .icon-btn svg { width: 16px; height: 16px; stroke: var(--gold); fill: none; }

  /* 語言切換（小） */
  .lang-mini {
    background: none;
    border: 1px solid rgba(200,169,110,0.25);
    color: var(--gold);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px 12px;
    cursor: pointer;
    height: 38px;
    transition: all 0.2s;
  }
  .lang-mini:hover { border-color: var(--gold); background: rgba(200,169,110,0.05); }

  /* ── Banner（縮小版） ── */
  .banner {
    padding: 24px 28px 0;
    position: relative;
  }
  .banner-inner {
    position: relative;
    height: 280px;
    overflow: hidden;
    border: 1px solid rgba(200,169,110,0.15);
    background: var(--black3);
  }
  .banner-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .banner-slide.active { opacity: 1; }
  .banner-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,9,6,0.2), rgba(10,9,6,0.55) 100%);
    pointer-events: none;
  }
  .banner-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 32px;
    z-index: 2;
  }
  .banner-region {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .banner-title {
    font-family: var(--font-serif);
    font-size: 30px;
    font-weight: 300;
    color: var(--white);
    line-height: 1.15;
  }
  .banner-title em { color: var(--gold); font-style: italic; }
  .banner-dots {
    position: absolute;
    bottom: 16px;
    right: 32px;
    display: flex;
    gap: 6px;
    z-index: 2;
  }
  .banner-dot {
    width: 24px;
    height: 2px;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.3s;
    border: none;
    padding: 0;
  }
  .banner-dot.active { background: var(--gold); width: 36px; }

  /* ── 分類九宮格 ── */
  .cat-section {
    padding: 32px 28px 24px;
  }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 12px;
    aspect-ratio: 3 / 3.4;
    max-width: 960px;
    margin: 0 auto;
  }
  .cat-tile {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: var(--black2);
    border: 1px solid rgba(200,169,110,0.15);
    transition: border-color 0.3s, transform 0.3s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .cat-tile:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
  }
  .cat-tile-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 0.6s ease, filter 0.3s;
    filter: brightness(0.68) saturate(0.95);
  }
  .cat-tile:hover .cat-tile-img {
    transform: scale(1.06);
    filter: brightness(0.78) saturate(1);
  }
  .cat-tile-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(10,9,6,0.55) 0%, rgba(10,9,6,0.25) 50%, rgba(10,9,6,0.7) 100%);
    pointer-events: none;
  }
  .cat-tile-label {
    position: absolute;
    inset: auto auto 0 0;
    padding: 14px 16px;
    z-index: 2;
  }
  .cat-tile-name {
    font-family: var(--font-serif);
    font-size: 24px;
    font-weight: 400;
    color: var(--white);
    line-height: 1.15;
    letter-spacing: 0.06em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }
  .cat-tile-en {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0.85;
  }

  /* 特色大格 (2x1 橫跨) */
  .cat-tile.feature {
    grid-column: span 2;
    grid-row: span 1;
    background: linear-gradient(135deg, #0a2a2e, #0e3a3a);
  }
  .cat-tile.feature .cat-tile-overlay {
    background: linear-gradient(135deg, rgba(10,9,6,0.35) 0%, rgba(10,9,6,0.1) 100%);
  }
  .cat-tile.feature .cat-tile-label {
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .cat-tile.feature .cat-tile-name {
    font-size: 38px;
    font-weight: 300;
    margin-bottom: 14px;
    letter-spacing: 0.12em;
  }
  .cat-tile.feature .cat-tile-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border: 1px solid rgba(245,240,232,0.4);
    color: var(--white);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: rgba(10,9,6,0.3);
    backdrop-filter: blur(6px);
    transition: all 0.2s;
  }
  .cat-tile.feature:hover .cat-tile-cta {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(10,9,6,0.5);
  }

  /* ── 區塊通用 ── */
  .section { padding: 80px 28px; }
  .section-bg-dark { background: var(--black2); border-top: 1px solid rgba(200,169,110,0.08); border-bottom: 1px solid rgba(200,169,110,0.08); }
  .section-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .section-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .section-title {
    font-family: var(--font-serif);
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 300;
    color: var(--white);
    line-height: 1.2;
  }
  .section-title em { color: var(--gold); font-style: italic; }

  /* ── 服務項目（保留改版） ── */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .service-card {
    background: var(--black2);
    border: 1px solid rgba(200,169,110,0.12);
    padding: 32px 28px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    min-height: 240px;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .service-card:hover { border-color: rgba(200,169,110,0.5); }
  .service-card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.3;
    transition: opacity 0.4s;
    z-index: 0;
  }
  .service-card:hover .service-card-bg { opacity: 0.5; }
  .service-card-veil {
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, rgba(15,13,9,0.92) 0%, rgba(15,13,9,0.65) 60%, rgba(15,13,9,0.4) 100%);
    z-index: 0;
  }
  .service-card-tag {
    position: relative;
    z-index: 1;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    border: 1px solid rgba(200,169,110,0.35);
    display: inline-block;
    padding: 3px 10px;
    background: rgba(15,13,9,0.4);
  }
  .service-card-title {
    position: relative;
    z-index: 1;
    font-family: var(--font-serif);
    font-size: 24px;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 10px;
  }
  .service-card-desc {
    position: relative;
    z-index: 1;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.8;
  }
  .service-card-more {
    position: relative;
    z-index: 1;
    margin-top: 18px;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── 出行流程 ── */
  .howitworks-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 2px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .howitworks-item { position: relative; }
  .howitworks-arrow {
    position: absolute;
    top: 50%;
    right: -12px;
    transform: translateY(-50%);
    z-index: 2;
    color: rgba(200,169,110,0.4);
  }
  .howitworks-card {
    background: linear-gradient(160deg, #14110b, #1c1810);
    border: 1px solid rgba(200,169,110,0.15);
    padding: 30px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
    transition: all 0.3s;
    min-height: 200px;
  }
  .howitworks-card:hover {
    border-color: rgba(200,169,110,0.5);
    transform: translateY(-3px);
  }
  .howitworks-num {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--gold);
    opacity: 0.7;
  }
  .howitworks-label {
    font-size: 14px;
    color: var(--white);
    margin-bottom: 4px;
    letter-spacing: 0.04em;
  }
  .howitworks-sub {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* ── FAQ ── */
  .faq-list { max-width: 800px; margin: 0 auto; }
  .faq-item { border-bottom: 1px solid rgba(200,169,110,0.15); }
  .faq-q {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 0;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .faq-q-text {
    font-size: 15px;
    color: var(--white);
    font-weight: 400;
    line-height: 1.5;
    padding-right: 20px;
  }
  .faq-q-icon {
    color: var(--gold);
    font-size: 20px;
    flex-shrink: 0;
    transition: transform 0.3s;
  }
  .faq-item.open .faq-q-icon { transform: rotate(45deg); }
  .faq-a {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.9;
  }
  .faq-item.open .faq-a {
    max-height: 400px;
    padding: 0 0 22px;
  }

  /* ── Footer ── */
  .footer {
    border-top: 1px solid rgba(200,169,110,0.15);
    padding: 50px 28px 28px;
    text-align: center;
  }
  .footer-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .footer-logo img { height: 40px; }
  .footer-logo-text {
    font-family: var(--font-serif);
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 0.18em;
  }
  .footer-tagline {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto;
  }
  .footer-bottom {
    padding: 20px 28px;
    border-top: 1px solid rgba(200,169,110,0.08);
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }

  /* ── CS Widget ── */
  .cs-widget {
    position: fixed;
    bottom: 0;
    right: 28px;
    z-index: 180;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }
  .cs-trigger {
    position: relative;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
  }
  .cs-trigger-inner {
    width: 80px;
    height: 104px;
    border-radius: 40px 40px 0 0;
    background: linear-gradient(135deg, var(--black3), var(--black4));
    border: 2px solid var(--gold);
    border-bottom: none;
    overflow: hidden;
    transition: transform 0.2s;
    box-shadow: 0 -6px 30px rgba(200,169,110,0.25);
    animation: csGlow 3s ease-in-out infinite;
  }
  .cs-trigger:hover .cs-trigger-inner { transform: scale(1.06); }
  .cs-trigger-face {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
    border-radius: 40px 40px 0 0;
  }
  .cs-label {
    position: absolute;
    right: 90px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--gold);
    color: var(--black);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    white-space: nowrap;
    text-transform: uppercase;
    font-family: inherit;
  }
  .cs-label::after {
    content: '';
    position: absolute;
    left: 100%;
    top: 50%;
    transform: translateY(-50%);
    border: 5px solid transparent;
    border-left-color: var(--gold);
  }
  @keyframes csGlow {
    0%, 100% { box-shadow: 0 -6px 30px rgba(200,169,110,0.25); }
    50% { box-shadow: 0 -6px 36px rgba(200,169,110,0.5); }
  }
  .cs-panel {
    background: var(--black2);
    border: 1px solid rgba(200,169,110,0.25);
    width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
    animation: panelIn 0.3s ease;
  }
  @keyframes panelIn {
    from { opacity: 0; transform: scale(0.92) translateY(10px); transform-origin: bottom right; }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .cs-panel-header {
    background: linear-gradient(135deg, var(--black3), var(--black4));
    border-bottom: 1px solid rgba(200,169,110,0.2);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .cs-channels { padding: 14px; display: flex; flex-direction: column; gap: 8px; }

                  <div className="cs-channel-name">客服電話</div>
                  <div className="cs-channel-detail">0800-123-456（免費）</div>
                </div>
                <span style={{color:'var(--text-muted)',fontSize:'12px'}}>›</span>
              </a>
            </div>
            <div style={{padding:'10px',borderTop:'1px solid rgba(200,169,110,0.1)',textAlign:'center',fontSize:'10px',color:'var(--text-muted)'}}>
              服務時間 09:00–22:00 (GMT+8)
            </div>
          </div>
        )}
        <button className="cs-trigger" onClick={() => setCsOpen(o => !o)}>
          {!csOpen && <div className="cs-label">客服</div>}
          <div className="cs-trigger-inner">
            <img className="cs-trigger-face" src="uploads/ChatGPT Image 2026年5月1日 下午08_00_14.png" alt="客服" />
          </div>
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
